# Security headers for easychoose.es
# Deployed automatically by deploy.sh to Plesk nginx additional config

# Canonical domain: force www.easychoose.es -> easychoose.es (non-www)
# Plesk applies this same "Additional nginx directives" block to the domain
# and to its www alias, so $host lets us tell them apart here.
if ($host != "easychoose.es") {
    return 301 https://easychoose.es$request_uri;
}

add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'none';" always;

# Plesk injects X-Powered-By: PleskLin at the platform level. Overriding it
# here with an empty value stops it from leaking the stack to clients.
# (The "Server: nginx" header can't be fully hidden from per-vhost config —
# that requires a global nginx build flag, out of scope for this repo.)
add_header X-Powered-By "" always;
